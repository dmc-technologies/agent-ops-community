name: Review Gate Dispatcher

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
      mode:
        description: "Review mode"
        required: true
        default: agent-review
        type: choice
        options:
          - agent-review

jobs:
  agent-review-label:
    name: Review Gate
    if: >-
      github.event_name == 'pull_request' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'ai review') ||
        github.event.action != 'labeled'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout trusted review gate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: review-gate-main
          fetch-depth: 1

      - name: Check trusted review gate availability
        id: trusted-gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f review-gate-main/.github/scripts/review_gate.py ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Trusted Review Gate script is not on the default branch yet; skipping bootstrap without executing PR-controlled code."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: steps.trusted-gate.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-workspace
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: steps.trusted-gate.outputs.available == 'true'
        with:
          python-version: "3.11"

      - name: Install Codex CLI
        if: steps.trusted-gate.outputs.available == 'true'
        run: npm install -g @openai/codex@0.141.0

      - name: Authenticate Codex CLI
        if: steps.trusted-gate.outputs.available == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY is required for Codex Review Gate."
            exit 1
          fi
          export CODEX_HOME="${RUNNER_TEMP}/review-gate-codex"
          mkdir -p "$CODEX_HOME"
          echo "CODEX_HOME=$CODEX_HOME" >> "$GITHUB_ENV"
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key

      - name: Load review prompt
        if: steps.trusted-gate.outputs.available == 'true'
        run: |
          PROMPT_FILE="review-gate-main/.github/review-gate-prompt.md"
          {
            echo "REVIEW_GATE_PROMPT<<REVIEW_GATE_PROMPT_EOF"
            if [ -f "$PROMPT_FILE" ]; then
              cat "$PROMPT_FILE"
            fi
            echo "REVIEW_GATE_PROMPT_EOF"
          } >> "$GITHUB_ENV"

      - name: Run review gate and submit approval
        if: steps.trusted-gate.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.REVIEW_GATE_APPROVAL_TOKEN || secrets.GITHUB_TOKEN }}
          REVIEW_GATE_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python review-gate-main/.github/scripts/review_gate.py \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --workspace pr-workspace \
            --sha "${{ github.event.pull_request.head.sha }}" \
            --post-status \
            --post-comment \
            --submit-approval \
            --run-url "$RUN_URL"

  agent-review-dispatch:
    name: Review Gate Dispatcher
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout workflow ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: review-gate-main
          fetch-depth: 1

      - name: Get PR head branch and SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh pr view "${{ github.event.inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json baseRefName,headRefOid,headRepository)
          BASE_REF=$(echo "$PR_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['baseRefName'])")
          HEAD_SHA=$(echo "$PR_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['headRefOid'])")
          HEAD_REPO=$(echo "$PR_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['headRepository']['nameWithOwner'])")
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          path: pr-workspace
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Codex CLI
        run: npm install -g @openai/codex@0.141.0

      - name: Authenticate Codex CLI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY is required for Codex Review Gate."
            exit 1
          fi
          export CODEX_HOME="${RUNNER_TEMP}/review-gate-codex"
          mkdir -p "$CODEX_HOME"
          echo "CODEX_HOME=$CODEX_HOME" >> "$GITHUB_ENV"
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key

      - name: Load review prompt
        run: |
          PROMPT_FILE="review-gate-main/.github/review-gate-prompt.md"
          {
            echo "REVIEW_GATE_PROMPT<<REVIEW_GATE_PROMPT_EOF"
            if [ -f "$PROMPT_FILE" ]; then
              cat "$PROMPT_FILE"
            fi
            echo "REVIEW_GATE_PROMPT_EOF"
          } >> "$GITHUB_ENV"

      - name: Run review gate
        env:
          GH_TOKEN: ${{ secrets.REVIEW_GATE_APPROVAL_TOKEN || secrets.GITHUB_TOKEN }}
          REVIEW_GATE_BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python review-gate-main/.github/scripts/review_gate.py \
            --pr "${{ github.event.inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --workspace pr-workspace \
            --sha "${{ steps.pr.outputs.head_sha }}" \
            --post-status \
            --post-comment \
            --submit-approval \
            --run-url "$RUN_URL"
