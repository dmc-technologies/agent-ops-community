name: Review Gate Dispatcher

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
      mode:
        description: "Review mode"
        required: true
        default: agent-review
        type: choice
        options:
          - agent-review

jobs:
  agent-review-label:
    name: Review Gate
    if: >-
      github.event_name == 'pull_request' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'ai review') ||
        github.event.action != 'labeled'
      )
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    uses: dmc-technologies/agent-ops/.github/workflows/review-gate-reusable.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repo: ${{ github.repository }}
      head_repo: ${{ github.event.pull_request.head.repo.full_name }}
      head_sha: ${{ github.event.pull_request.head.sha }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      codex_model: ${{ vars.REVIEW_GATE_CODEX_MODEL || '' }}
    secrets: inherit

  resolve-dispatch-pr:
    name: Resolve PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      base_ref: ${{ steps.pr.outputs.base_ref }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
    steps:
      - name: Get PR head branch and SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_DATA=$(gh pr view "${{ github.event.inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json baseRefName,headRefOid,headRepository)
          BASE_REF=$(echo "$PR_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['baseRefName'])")
          HEAD_SHA=$(echo "$PR_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['headRefOid'])")
          HEAD_REPO=$(echo "$PR_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['headRepository']['nameWithOwner'])")
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"

  agent-review-dispatch:
    name: Review Gate Dispatcher
    if: github.event_name == 'workflow_dispatch'
    needs: resolve-dispatch-pr
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    uses: dmc-technologies/agent-ops/.github/workflows/review-gate-reusable.yml@main
    with:
      pr_number: ${{ github.event.inputs.pr_number }}
      repo: ${{ github.repository }}
      head_repo: ${{ needs.resolve-dispatch-pr.outputs.head_repo }}
      head_sha: ${{ needs.resolve-dispatch-pr.outputs.head_sha }}
      base_ref: ${{ needs.resolve-dispatch-pr.outputs.base_ref }}
      codex_model: ${{ vars.REVIEW_GATE_CODEX_MODEL || '' }}
    secrets: inherit
